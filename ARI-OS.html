<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARI — Async Research Institute OS</title>
<style>
  :root {
    --bg: #080c0e;
    --bg2: #0d1214;
    --bg3: #111618;
    --amber: #e8920a;
    --amber2: #f5a623;
    --amber3: #c47a08;
    --amber-dim: rgba(232,146,10,0.15);
    --amber-glow: rgba(232,146,10,0.4);
    --green: #1aff8c;
    --green-dim: rgba(26,255,140,0.12);
    --cyan: #0af0e8;
    --cyan-dim: rgba(10,240,232,0.1);
    --red: #ff3c3c;
    --text: #c8d4d8;
    --text-dim: #5a6870;
    --text-bright: #e8f4f8;
    --border: rgba(232,146,10,0.25);
    --border-bright: rgba(232,146,10,0.6);
    --panel: rgba(13,18,20,0.95);
    --shadow: 0 0 30px rgba(232,146,10,0.08), 0 4px 20px rgba(0,0,0,0.8);
    --font: 'Courier New', 'Lucida Console', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid background */
  #grid-bg {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(232,146,10,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,146,10,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ============ TOP BAR ============ */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 48px;
    background: linear-gradient(180deg, rgba(15,20,22,0.98) 0%, rgba(10,14,16,0.95) 100%);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    z-index: 1000;
    padding: 0 16px;
    gap: 0;
  }

  .topbar-left {
    display: flex; align-items: center; gap: 12px; min-width: 260px;
  }

  .ari-logo {
    width: 34px; height: 34px; flex-shrink: 0;
  }

  .researcher-info {
    display: flex; flex-direction: column; gap: 1px;
  }

  .researcher-name {
    font-size: 11px; font-weight: bold; color: var(--amber2);
    letter-spacing: 2px; text-transform: uppercase;
  }

  .researcher-rank {
    font-size: 9px; color: var(--text-dim); letter-spacing: 1px;
    text-transform: uppercase;
  }

  .topbar-center {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 24px;
  }

  .status-pill {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    padding: 3px 10px; border: 1px solid;
    display: flex; align-items: center; gap: 6px;
  }

  .status-pill.online { border-color: var(--green); color: var(--green); }
  .status-pill.secure { border-color: var(--amber); color: var(--amber); }
  .status-pill.classified { border-color: var(--red); color: var(--red); }

  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: currentColor;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .topbar-right {
    min-width: 260px; display: flex; align-items: center; justify-content: flex-end; gap: 16px;
  }

  #clock-display {
    display: flex; flex-direction: column; align-items: flex-end;
  }

  #clock-time {
    font-size: 22px; font-weight: bold; color: var(--amber2);
    letter-spacing: 3px; line-height: 1;
  }

  #clock-date {
    font-size: 9px; color: var(--text-dim); letter-spacing: 1px;
    text-transform: uppercase; margin-top: 2px;
  }

  .corner-bracket {
    position: absolute; width: 12px; height: 12px;
    border-color: var(--amber); border-style: solid;
  }

  /* ============ SIDE PANELS ============ */
  #left-panel {
    position: fixed; left: 0; top: 48px; bottom: 40px; width: 56px;
    background: linear-gradient(90deg, rgba(10,14,16,0.98) 0%, rgba(13,18,20,0.95) 100%);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px;
    z-index: 100;
  }

  #right-panel {
    position: fixed; right: 0; top: 48px; bottom: 40px; width: 56px;
    background: linear-gradient(270deg, rgba(10,14,16,0.98) 0%, rgba(13,18,20,0.95) 100%);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 4px;
    z-index: 100;
  }

  .side-icon-btn {
    width: 36px; height: 36px;
    background: transparent; border: 1px solid transparent;
    color: var(--text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; transition: all 0.2s;
    position: relative;
  }

  .side-icon-btn:hover, .side-icon-btn.active {
    color: var(--amber); border-color: var(--border);
    background: var(--amber-dim);
    box-shadow: 0 0 8px var(--amber-glow);
  }

  .side-icon-btn .tooltip {
    position: absolute; left: 46px; top: 50%; transform: translateY(-50%);
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--amber); font-size: 9px; letter-spacing: 1px;
    padding: 4px 8px; white-space: nowrap; pointer-events: none;
    opacity: 0; transition: opacity 0.2s; text-transform: uppercase;
    z-index: 999;
  }

  #right-panel .side-icon-btn .tooltip {
    left: auto; right: 46px;
  }

  .side-icon-btn:hover .tooltip { opacity: 1; }

  /* ============ DESKTOP ============ */
  #desktop {
    position: fixed;
    top: 48px; bottom: 40px; left: 56px; right: 56px;
    overflow: hidden;
    z-index: 50;
  }

  /* ============ HUD DECORATIONS ============ */
  .hud-corner {
    position: absolute; width: 60px; height: 60px; pointer-events: none; z-index: 10;
  }

  .hud-corner.tl { top: 0; left: 0; border-top: 2px solid var(--amber); border-left: 2px solid var(--amber); }
  .hud-corner.tr { top: 0; right: 0; border-top: 2px solid var(--amber); border-right: 2px solid var(--amber); }
  .hud-corner.bl { bottom: 0; left: 0; border-bottom: 2px solid var(--amber); border-left: 2px solid var(--amber); }
  .hud-corner.br { bottom: 0; right: 0; border-bottom: 2px solid var(--amber); border-right: 2px solid var(--amber); }

  /* ============ WINDOWS ============ */
  .window {
    position: absolute;
    background: var(--panel);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    min-width: 280px; min-height: 160px;
    transition: box-shadow 0.2s;
    z-index: 200;
  }

  .window.focused {
    border-color: var(--border-bright);
    box-shadow: 0 0 0 1px var(--amber3), 0 0 40px rgba(232,146,10,0.15), 0 8px 32px rgba(0,0,0,0.8);
    z-index: 300;
  }

  .window-titlebar {
    height: 32px; display: flex; align-items: center;
    background: linear-gradient(180deg, rgba(232,146,10,0.12) 0%, rgba(232,146,10,0.04) 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 10px; cursor: move; flex-shrink: 0;
    position: relative;
  }

  .window-titlebar::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--amber);
  }

  .window-title {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--amber2); font-weight: bold; flex: 1; padding-left: 8px;
    pointer-events: none;
  }

  .window-icon {
    font-size: 12px; margin-right: 6px; pointer-events: none;
  }

  .window-controls {
    display: flex; gap: 4px;
  }

  .wctrl {
    width: 16px; height: 16px; border: 1px solid;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; transition: all 0.15s;
  }

  .wctrl.min { border-color: var(--amber3); color: var(--amber3); }
  .wctrl.max { border-color: var(--amber); color: var(--amber); }
  .wctrl.close { border-color: var(--red); color: var(--red); }
  .wctrl:hover { filter: brightness(1.5); background: rgba(255,255,255,0.05); }

  .window-body {
    flex: 1; overflow: auto; padding: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--amber3) transparent;
  }

  .window-body::-webkit-scrollbar { width: 4px; }
  .window-body::-webkit-scrollbar-thumb { background: var(--amber3); }

  .window-resize {
    position: absolute; right: 0; bottom: 0; width: 14px; height: 14px;
    cursor: se-resize;
    border-right: 2px solid var(--amber3); border-bottom: 2px solid var(--amber3);
  }

  /* ============ TASKBAR ============ */
  #taskbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
    background: linear-gradient(0deg, rgba(10,14,16,0.98) 0%, rgba(15,20,22,0.95) 100%);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px;
    gap: 4px; z-index: 1000;
  }

  .taskbar-app-btn {
    height: 26px; padding: 0 10px;
    background: var(--bg3); border: 1px solid var(--border);
    color: var(--text-dim); font-family: var(--font);
    font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }

  .taskbar-app-btn:hover {
    color: var(--amber); border-color: var(--amber3);
    background: var(--amber-dim);
  }

  .taskbar-app-btn.open {
    color: var(--amber2); border-color: var(--amber);
    background: var(--amber-dim);
    box-shadow: 0 0 6px var(--amber-glow);
  }

  .taskbar-sep {
    width: 1px; height: 20px; background: var(--border); margin: 0 4px;
  }

  .taskbar-right {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
  }

  .sys-info {
    font-size: 8px; color: var(--text-dim); letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ============ NOTIFICATION ============ */
  #notification-area {
    position: fixed; bottom: 50px; right: 70px;
    display: flex; flex-direction: column-reverse; gap: 6px;
    z-index: 9000; pointer-events: none;
  }

  .notif {
    background: var(--bg2); border: 1px solid var(--amber3);
    border-left: 3px solid var(--amber); padding: 8px 12px;
    font-size: 9px; color: var(--amber2); letter-spacing: 1px;
    animation: notif-in 0.3s ease, notif-out 0.3s ease 2.7s forwards;
    max-width: 280px;
  }

  .notif.green { border-color: var(--green); border-left-color: var(--green); color: var(--green); }
  .notif.red { border-color: var(--red); border-left-color: var(--red); color: var(--red); }

  @keyframes notif-in { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes notif-out { to { opacity: 0; transform: translateX(20px); } }

  /* ============ CONTENT STYLES ============ */

  /* Dashboard */
  .dash-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }

  .stat-card {
    background: rgba(232,146,10,0.05); border: 1px solid var(--border);
    padding: 10px; position: relative; overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--amber), transparent);
  }

  .stat-label { font-size: 8px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .stat-value { font-size: 28px; color: var(--amber2); font-weight: bold; line-height: 1.2; }
  .stat-sub { font-size: 8px; color: var(--green); letter-spacing: 1px; }

  .activity-list { margin-top: 10px; }

  .activity-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid rgba(232,146,10,0.08);
    font-size: 9px;
  }

  .activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--amber); margin-top: 2px; flex-shrink: 0; }
  .activity-dot.green { background: var(--green); }
  .activity-dot.cyan { background: var(--cyan); }
  .activity-time { color: var(--text-dim); min-width: 50px; }

  .progress-bar {
    height: 4px; background: rgba(255,255,255,0.05); position: relative; margin-top: 4px;
  }

  .progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--amber3), var(--amber2));
    transition: width 0.5s;
  }

  /* Notes */
  .notes-list { display: flex; flex-direction: column; gap: 6px; }

  .note-item {
    background: rgba(232,146,10,0.04); border: 1px solid var(--border);
    border-left: 2px solid var(--amber3); padding: 8px 10px; cursor: pointer;
    transition: all 0.15s;
  }

  .note-item:hover { border-color: var(--amber); background: var(--amber-dim); }

  .note-item-title { font-size: 10px; color: var(--amber2); margin-bottom: 3px; }
  .note-item-preview { font-size: 8px; color: var(--text-dim); }

  .note-editor { display: flex; flex-direction: column; gap: 8px; }

  input[type=text], textarea, select {
    background: var(--bg2); border: 1px solid var(--border);
    color: var(--text-bright); font-family: var(--font); font-size: 10px;
    padding: 6px 8px; outline: none; transition: border-color 0.2s;
    width: 100%;
  }

  input[type=text]:focus, textarea:focus, select:focus {
    border-color: var(--amber); box-shadow: 0 0 0 1px rgba(232,146,10,0.2);
  }

  textarea { resize: vertical; min-height: 80px; }

  .btn {
    padding: 6px 14px; font-family: var(--font); font-size: 9px;
    letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
    border: 1px solid; transition: all 0.15s; background: transparent;
  }

  .btn-amber { border-color: var(--amber3); color: var(--amber2); }
  .btn-amber:hover { background: var(--amber-dim); border-color: var(--amber); box-shadow: 0 0 8px var(--amber-glow); }
  .btn-green { border-color: var(--green); color: var(--green); }
  .btn-green:hover { background: var(--green-dim); }
  .btn-red { border-color: var(--red); color: var(--red); }
  .btn-red:hover { background: rgba(255,60,60,0.1); }
  .btn-cyan { border-color: var(--cyan); color: var(--cyan); }
  .btn-cyan:hover { background: var(--cyan-dim); }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; }

  /* Tasks */
  .task-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 8px; border: 1px solid var(--border);
    background: rgba(232,146,10,0.03); margin-bottom: 5px;
    transition: all 0.15s;
  }

  .task-item:hover { border-color: var(--amber3); }

  .task-check {
    width: 14px; height: 14px; border: 1px solid var(--amber3);
    cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    font-size: 9px; transition: all 0.15s;
  }

  .task-check.done { background: var(--amber3); color: #000; border-color: var(--amber); }
  .task-check:hover { border-color: var(--amber); }

  .task-text { flex: 1; font-size: 9px; letter-spacing: 0.5px; }
  .task-text.done { text-decoration: line-through; color: var(--text-dim); }

  .task-priority {
    font-size: 7px; padding: 2px 5px; border: 1px solid;
    letter-spacing: 1px; text-transform: uppercase;
  }

  .task-priority.high { border-color: var(--red); color: var(--red); }
  .task-priority.med { border-color: var(--amber3); color: var(--amber3); }
  .task-priority.low { border-color: var(--text-dim); color: var(--text-dim); }

  /* File Vault */
  .file-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

  .file-item {
    background: rgba(232,146,10,0.04); border: 1px solid var(--border);
    padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s;
    position: relative;
  }

  .file-item:hover { border-color: var(--amber); background: var(--amber-dim); }

  .file-icon { font-size: 24px; margin-bottom: 6px; display: block; }
  .file-name { font-size: 8px; color: var(--amber2); letter-spacing: 0.5px; word-break: break-word; }
  .file-size { font-size: 7px; color: var(--text-dim); margin-top: 3px; }

  .file-del {
    position: absolute; top: 3px; right: 3px; font-size: 8px;
    color: var(--red); cursor: pointer; opacity: 0; transition: opacity 0.15s;
    line-height: 1;
  }

  .file-item:hover .file-del { opacity: 1; }

  /* Terminal */
  #terminal-output {
    flex: 1; overflow-y: auto; font-size: 10px; padding: 8px;
    color: var(--green); background: rgba(0,0,0,0.5);
    scrollbar-width: thin; scrollbar-color: var(--amber3) transparent;
    min-height: 200px;
  }

  #terminal-output::-webkit-scrollbar { width: 4px; }
  #terminal-output::-webkit-scrollbar-thumb { background: var(--amber3); }

  .term-line { margin-bottom: 3px; line-height: 1.5; }
  .term-prompt { color: var(--amber2); }
  .term-error { color: var(--red); }
  .term-info { color: var(--cyan); }
  .term-success { color: var(--green); }

  .terminal-input-row {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-top: 1px solid rgba(232,146,10,0.15);
    background: rgba(0,0,0,0.3);
  }

  .term-prompt-label { color: var(--amber2); font-size: 10px; white-space: nowrap; }

  #terminal-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--green); font-family: var(--font); font-size: 10px;
    caret-color: var(--green);
  }

  /* Calendar */
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px;
  }

  .cal-day-header {
    font-size: 8px; color: var(--text-dim); text-align: center;
    letter-spacing: 1px; text-transform: uppercase; padding: 4px 0;
  }

  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 9px; cursor: pointer; border: 1px solid transparent;
    transition: all 0.15s; position: relative;
  }

  .cal-day:hover { border-color: var(--amber3); background: var(--amber-dim); }
  .cal-day.today { border-color: var(--amber); color: var(--amber2); background: rgba(232,146,10,0.1); }
  .cal-day.empty { cursor: default; }
  .cal-day.has-event::after {
    content: ''; position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%; background: var(--amber);
  }

  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-month { font-size: 11px; color: var(--amber2); letter-spacing: 2px; text-transform: uppercase; }

  /* Search */
  .search-result {
    padding: 8px; border-bottom: 1px solid var(--border);
    cursor: pointer; font-size: 9px; transition: background 0.15s;
  }

  .search-result:hover { background: var(--amber-dim); }

  .search-result-type { color: var(--text-dim); font-size: 7px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 2px; }
  .search-result-title { color: var(--amber2); }
  .search-result-sub { color: var(--text-dim); font-size: 8px; margin-top: 2px; }

  /* Settings */
  .setting-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid rgba(232,146,10,0.08);
    font-size: 9px;
  }

  .setting-label { color: var(--text); letter-spacing: 1px; }
  .setting-desc { font-size: 8px; color: var(--text-dim); margin-top: 2px; }

  /* Toggle */
  .toggle {
    width: 34px; height: 18px; background: var(--bg3);
    border: 1px solid var(--border); cursor: pointer; position: relative;
    transition: all 0.2s; flex-shrink: 0;
  }

  .toggle.on { background: rgba(232,146,10,0.2); border-color: var(--amber); }

  .toggle-knob {
    position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; background: var(--text-dim); transition: all 0.2s;
  }

  .toggle.on .toggle-knob { left: 18px; background: var(--amber); }

  /* Map / Entity Tracker */
  #entity-canvas { width: 100%; height: 200px; background: rgba(0,0,0,0.5); border: 1px solid var(--border); }

  /* Sector map labels */
  .map-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; font-size: 8px; }
  .legend-item { display: flex; align-items: center; gap: 4px; }
  .legend-dot { width: 6px; height: 6px; border-radius: 50%; }

  /* Section headers */
  .section-header {
    font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--amber3); margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid rgba(232,146,10,0.15);
    display: flex; align-items: center; gap: 6px;
  }

  .section-header::before {
    content: ''; width: 12px; height: 1px; background: var(--amber);
  }

  /* Data Table */
  .data-table { width: 100%; border-collapse: collapse; font-size: 9px; }
  .data-table th {
    font-size: 7px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--amber3); padding: 6px 8px; border-bottom: 1px solid var(--border);
    text-align: left;
  }

  .data-table td {
    padding: 6px 8px; border-bottom: 1px solid rgba(232,146,10,0.06);
    color: var(--text); transition: background 0.15s;
  }

  .data-table tr:hover td { background: var(--amber-dim); }

  /* Encryption badge */

  /* ARI Center Logo (desktop) */

  /* Scrollbar for window-body */

  /* Alert bar */

  /* Tag */

  .tag-amber { border-color: var(--amber3); color: var(--amber3); }

  /* Select dropdown */

  /* Resize handle visual */

<script>
// ============ STATE ============
const STATE = {
  windows: {},
  zIndex: 300,
  notes: JSON.parse(localStorage.getItem('ari_notes') || '[]'),
  tasks: JSON.parse(localStorage.getItem('ari_tasks') || '[]'),
  files: JSON.parse(localStorage.getItem('ari_files') || '[]'),
  events: JSON.parse(localStorage.getItem('ari_events') || '[]'),
  settings: JSON.parse(localStorage.getItem('ari_settings') || '{"name":"DR. ANALYST","theme":"amber","notifications":true,"grid":true,"scanlines":true}'),
  calendarMonth: new Date().getMonth(),
  calendarYear: new Date().getFullYear(),
  termHistory: [],
  termHistIdx: -1,
  dataset: []
};

// Seed default data
if (STATE.notes.length === 0) {
  STATE.notes = [
    { id: uid(), title: 'Project Nexus — Phase 2', body: 'Continue analysis of async signal patterns. Cross-reference with Dataset-7 entries from March. Key anomaly: signal delay variance exceeds 300ms threshold during peak hours.\n\nFollow up with team: ask about redundancy protocols.', tags: ['nexus', 'signals'], ts: Date.now() - 86400000 },
    { id: uid(), title: 'Interview Notes: Subject 04', body: 'Subject displays above-average pattern recognition. Recommend for Track B evaluation. Concerns: memory consolidation irregularities — schedule follow-up scan.', tags: ['interview', 'track-b'], ts: Date.now() - 172800000 },
    { id: uid(), title: 'Cipher Key — Rotation Schedule', body: 'Keys rotate every 72 hours. Current cycle: Gamma-7. Next rotation: see calendar entry. Store backup in vault under CIPHER_GAMMA.', tags: ['security', 'cipher'], ts: Date.now() }
  ];
  save('notes');
}

if (STATE.tasks.length === 0) {
  STATE.tasks = [
    { id: uid(), text: 'Complete Phase 2 signal analysis report', priority: 'high', done: false, ts: Date.now() },
    { id: uid(), text: 'Review Dataset-7 anomaly logs', priority: 'high', done: false, ts: Date.now() },
    { id: uid(), text: 'Submit clearance renewal forms', priority: 'med', done: true, ts: Date.now() - 86400000 },
    { id: uid(), text: 'Update encryption keys (Gamma rotation)', priority: 'med', done: false, ts: Date.now() },
    { id: uid(), text: 'Archive Q1 research files', priority: 'low', done: false, ts: Date.now() }
  ];
  save('tasks');
}

if (STATE.files.length === 0) {
  STATE.files = [
    { id: uid(), name: 'nexus_report_v3.pdf', type: 'pdf', size: '2.4 MB', ts: Date.now() - 86400000 },
    { id: uid(), name: 'dataset_07_raw.csv', type: 'csv', size: '14.1 MB', ts: Date.now() - 172800000 },
    { id: uid(), name: 'interview_04.enc', type: 'enc', size: '840 KB', ts: Date.now() },
    { id: uid(), name: 'cipher_gamma_backup.key', type: 'key', size: '4 KB', ts: Date.now() },
    { id: uid(), name: 'sector_map_q2.svg', type: 'img', size: '1.2 MB', ts: Date.now() - 259200000 }
  ];
  save('files');
}

if (STATE.dataset.length === 0) {
  STATE.dataset = [
    { id: 'SIG-001', source: 'Node Alpha', strength: '87%', delay: '12ms', status: 'STABLE', classified: true },
    { id: 'SIG-002', source: 'Node Bravo', strength: '42%', delay: '340ms', status: 'ANOMALY', classified: true },
    { id: 'SIG-003', source: 'Node Charlie', strength: '95%', delay: '8ms', status: 'STABLE', classified: false },
    { id: 'SIG-004', source: 'Node Delta', strength: '61%', delay: '180ms', status: 'DEGRADED', classified: true },
    { id: 'SIG-005', source: 'Node Echo', strength: '0%', delay: '—', status: 'OFFLINE', classified: false },
    { id: 'SIG-006', source: 'Node Foxtrot', strength: '78%', delay: '22ms', status: 'STABLE', classified: false },
    { id: 'SIG-007', source: 'Node Ghost', strength: '34%', delay: '510ms', status: 'ANOMALY', classified: true }
  ];
}

// Apply settings
applySettings();

// ============ UTILITIES ============
function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function save(key) { localStorage.setItem('ari_' + key, JSON.stringify(STATE[key])); }
function ts2str(ts) { return new Date(ts).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function notify(msg, type='') {
  const area = document.getElementById('notification-area');
  const el = document.createElement('div');
  el.className = 'notif ' + type;
  el.textContent = msg;
  area.appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

function applySettings() {
  document.getElementById('researcher-name-display').textContent = STATE.settings.name || 'DR. ANALYST';
  document.body.style.setProperty('--amber', STATE.settings.theme === 'cyan' ? '#0af0e8' : STATE.settings.theme === 'green' ? '#1aff8c' : '#e8920a');
  document.body.style.setProperty('--amber2', STATE.settings.theme === 'cyan' ? '#4af8f2' : STATE.settings.theme === 'green' ? '#4affa0' : '#f5a623');
  document.body.style.setProperty('--amber3', STATE.settings.theme === 'cyan' ? '#08c0ba' : STATE.settings.theme === 'green' ? '#10cc6a' : '#c47a08');
  document.body.style.setProperty('--amber-dim', STATE.settings.theme === 'cyan' ? 'rgba(10,240,232,0.1)' : STATE.settings.theme === 'green' ? 'rgba(26,255,140,0.1)' : 'rgba(232,146,10,0.15)');
  document.body.style.setProperty('--amber-glow', STATE.settings.theme === 'cyan' ? 'rgba(10,240,232,0.3)' : STATE.settings.theme === 'green' ? 'rgba(26,255,140,0.3)' : 'rgba(232,146,10,0.4)');
  save('settings');
}

// ============ CLOCK ============
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = h + ':' + m + ':' + s;
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('clock-date').textContent = `${days[now.getDay()]} ${String(now.getDate()).padStart(2,'0')} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
setInterval(updateClock, 1000);
updateClock();

// ============ SYSTEM STATS ============
function updateStats() {
  const cpu = Math.floor(Math.random() * 30 + 5);
  const mem = (Math.random() * 2 + 3.5).toFixed(1);
  document.getElementById('sys-cpu').textContent = 'CPU: ' + cpu + '%';
  document.getElementById('sys-mem').textContent = 'MEM: ' + mem + 'GB';
}
setInterval(updateStats, 3000);

// ============ WINDOW MANAGEMENT ============
const APP_DEFS = {
  dashboard: { title: 'Research Dashboard', icon: '◈', w: 600, h: 480 },
  notes:     { title: 'Research Notes', icon: '▤', w: 520, h: 500 },
  tasks:     { title: 'Task Manager', icon: '☑', w: 440, h: 460 },
  vault:     { title: 'File Vault', icon: '▣', w: 500, h: 420 },
  terminal:  { title: 'Terminal — ARI//SYS', icon: '⌘', w: 560, h: 420 },
  data:      { title: 'Data Browser', icon: '≡', w: 640, h: 440 },
  calendar:  { title: 'Research Calendar', icon: '▦', w: 380, h: 400 },
  search:    { title: 'Global Search', icon: '⊕', w: 440, h: 460 },
  tracker:   { title: 'Signal Tracker', icon: '◎', w: 420, h: 440 },
  settings:  { title: 'System Settings', icon: '⚙', w: 420, h: 440 }
};

function openApp(appId) {
  if (STATE.windows[appId]) {
    focusWindow(appId);
    const w = document.getElementById('win-' + appId);
    if (w && w.style.display === 'none') w.style.display = 'flex';
    return;
  }
  createWindow(appId);
}

function createWindow(appId) {
  const def = APP_DEFS[appId];
  if (!def) return;

  const desktop = document.getElementById('desktop');
  const dw = desktop.clientWidth, dh = desktop.clientHeight;

  const w = Math.min(def.w, dw - 40);
  const h = Math.min(def.h, dh - 40);
  const x = Math.max(0, Math.floor(Math.random() * (dw - w - 40)));
  const y = Math.max(0, Math.floor(Math.random() * (dh - h - 40)));

  const win = document.createElement('div');
  win.className = 'window focused';
  win.id = 'win-' + appId;
  win.style.cssText = `width:${w}px;height:${h}px;left:${x}px;top:${y}px;z-index:${++STATE.zIndex};`;

  win.innerHTML = `
    <div class="window-titlebar" id="titlebar-${appId}">
      <span class="window-icon">${def.icon}</span>
      <span class="window-title">${def.title}</span>
      <div class="window-controls">
        <button class="wctrl min" onclick="minimizeWindow('${appId}')">─</button>
        <button class="wctrl max" onclick="maximizeWindow('${appId}')">□</button>
        <button class="wctrl close" onclick="closeWindow('${appId}')">✕</button>
      </div>
    </div>
    <div class="window-body" id="body-${appId}">
      ${renderApp(appId)}
    </div>
    <div class="window-resize" id="resize-${appId}"></div>
  `;

  desktop.appendChild(win);
  STATE.windows[appId] = { minimized: false, x, y, w, h };

  makeDraggable(win, document.getElementById('titlebar-' + appId), appId);
  makeResizable(win, document.getElementById('resize-' + appId), appId);

  win.addEventListener('mousedown', () => focusWindow(appId));

  addTaskbarBtn(appId);
  initAppLogic(appId);
}

function focusWindow(appId) {
  Object.keys(STATE.windows).forEach(id => {
    const w = document.getElementById('win-' + id);
    if (w) w.classList.remove('focused');
  });
  const w = document.getElementById('win-' + appId);
  if (w) { w.classList.add('focused'); w.style.zIndex = ++STATE.zIndex; }
}

function closeWindow(appId) {
  const w = document.getElementById('win-' + appId);
  if (w) w.remove();
  delete STATE.windows[appId];
  removeTaskbarBtn(appId);
  const btn = document.getElementById('btn-' + appId);
  if (btn) btn.classList.remove('active');
}

function minimizeWindow(appId) {
  const w = document.getElementById('win-' + appId);
  if (w) { w.style.display = 'none'; STATE.windows[appId].minimized = true; }
  const btn = document.getElementById('tbtn-' + appId);
  if (btn) btn.style.opacity = '0.5';
}

let _maximized = {};
function maximizeWindow(appId) {
  const w = document.getElementById('win-' + appId);
  const desktop = document.getElementById('desktop');
  if (!w) return;
  if (_maximized[appId]) {
    const prev = _maximized[appId];
    w.style.cssText = `width:${prev.w}px;height:${prev.h}px;left:${prev.x}px;top:${prev.y}px;z-index:${STATE.zIndex};`;
    delete _maximized[appId];
  } else {
    _maximized[appId] = { w: w.offsetWidth, h: w.offsetHeight, x: parseInt(w.style.left), y: parseInt(w.style.top) };
    w.style.cssText = `width:${desktop.clientWidth}px;height:${desktop.clientHeight}px;left:0;top:0;z-index:${STATE.zIndex};`;
  }
}

function addTaskbarBtn(appId) {
  const def = APP_DEFS[appId];
  const container = document.getElementById('taskbar-apps');
  const btn = document.createElement('button');
  btn.className = 'taskbar-app-btn open';
  btn.id = 'tbtn-' + appId;
  btn.innerHTML = `${def.icon} ${def.title.split('—')[0].trim()}`;
  btn.onclick = () => {
    const w = document.getElementById('win-' + appId);
    if (!w) return;
    if (w.style.display === 'none') { w.style.display = 'flex'; STATE.windows[appId].minimized = false; btn.style.opacity = '1'; focusWindow(appId); }
    else if (!w.classList.contains('focused')) { focusWindow(appId); }
    else { minimizeWindow(appId); }
  };
  container.appendChild(btn);
  const leftBtn = document.getElementById('btn-' + appId);
  if (leftBtn) leftBtn.classList.add('active');
}

function removeTaskbarBtn(appId) {
  const btn = document.getElementById('tbtn-' + appId);
  if (btn) btn.remove();
}

// ============ DRAG ============
function makeDraggable(win, handle, appId) {
  let dragging = false, ox = 0, oy = 0;
  handle.addEventListener('mousedown', e => {
    if (e.target.classList.contains('wctrl')) return;
    dragging = true; ox = e.clientX - win.offsetLeft; oy = e.clientY - win.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const desktop = document.getElementById('desktop');
    const nx = Math.max(0, Math.min(e.clientX - ox, desktop.clientWidth - win.offsetWidth));
    const ny = Math.max(0, Math.min(e.clientY - oy, desktop.clientHeight - win.offsetHeight));
    win.style.left = nx + 'px'; win.style.top = ny + 'px';
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

// ============ RESIZE ============
function makeResizable(win, handle, appId) {
  let resizing = false, sx = 0, sy = 0, sw = 0, sh = 0;
  handle.addEventListener('mousedown', e => {
    resizing = true; sx = e.clientX; sy = e.clientY;
    sw = win.offsetWidth; sh = win.offsetHeight; e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const nw = Math.max(280, sw + e.clientX - sx);
    const nh = Math.max(160, sh + e.clientY - sy);
    win.style.width = nw + 'px'; win.style.height = nh + 'px';
  });
  document.addEventListener('mouseup', () => { resizing = false; });
}

// ============ APP RENDERERS ============
function renderApp(appId) {
  switch (appId) {
    case 'dashboard': return renderDashboard();
    case 'notes': return renderNotes();
    case 'tasks': return renderTasks();
    case 'vault': return renderVault();
    case 'terminal': return renderTerminal();
    case 'data': return renderData();
    case 'calendar': return renderCalendar();
    case 'search': return renderSearch();
    case 'tracker': return renderTracker();
    case 'settings': return renderSettings();
    default: return '<div style="color:var(--text-dim);font-size:10px">App not found.</div>';
  }
}

function renderDashboard() {
  const done = STATE.tasks.filter(t => t.done).length;

function saveNote(id) {

const TERM_COMMANDS = {
  help: () => [
    {t:'info', s:'Available commands:'},
    {t:'', s:'  ls / list     — list research notes'},
    {t:'', s:'  tasks         — show pending tasks'},
    {t:'', s:'  vault         — list vault files'},
    {t:'', s:'  status        — system status'},
    {t:'', s:'  signals       — show signal data'},
    {t:'', s:'  whoami        — researcher profile'},
    {t:'', s:'  date          — current timestamp'},
    {t:'', s:'  clear         — clear terminal'},
    {t:'', s:'  ping [node]   — ping a signal node'},
    {t:'', s:'  encrypt [txt] — simulate encrypt'},
    {t:'', s:'  decrypt       — simulate decrypt'},
    {t:'', s:'  scan          — scan for anomalies'},
    {t:'', s:'  note [title]  — quick note lookup'},
    {t:'', s:'  echo [text]   — echo text'},
  ],
  ls: () => STATE.notes.map(n=>({t:'success', s:`[NOTE] ${n.title} (${ts2str(n.ts)})`})),
  list: () => TERM_COMMANDS.ls(),
  tasks: () => STATE.tasks.filter(t=>!t.done).map(t=>({t:'', s:`[${t.priority.toUpperCase()}] ${t.text}`})),
  vault: () => STATE.files.map(f=>({t:'success', s:`[${f.type.toUpperCase().padEnd(4)}] ${f.name} (${f.size})`})),
  status: () => [
    {t:'success', s:'SYSTEM STATUS: NOMINAL'},
    {t:'info', s:`Notes: ${STATE.notes.length} | Tasks: ${STATE.tasks.length} | Files: ${STATE.files.length}`},
    {t:'success', s:'Encryption: ACTIVE (AES-256)'},
    {t:'success', s:'Network: SECURED'},
    {t:'', s:`Uptime: ${Math.floor(performance.now()/1000)}s`}
  ],
  signals: () => STATE.dataset.map(s=>({t:s.status==='STABLE'?'success':s.status==='OFFLINE'?'error':'', s:`${s.id} | ${s.source.padEnd(14)} | ${s.strength.padEnd(5)} | ${s.delay.padEnd(6)} | ${s.status}`})),
  whoami: () => [{t:'info', s:`Researcher: ${STATE.settings.name}`},{t:'', s:'Institute: Async Research Institute'},{t:'', s:'Clearance: LEVEL-4'},{t:'success', s:'Status: ACTIVE'}],
  date: () => [{t:'info', s:new Date().toString()}],
  clear: () => { const o=document.getElementById('terminal-output'); if(o){o.innerHTML='';} return []; },
  scan: () => {
    const anomalies = STATE.dataset.filter(s=>s.status!=='STABLE'&&s.status!=='OFFLINE');
    if (!anomalies.length) return [{t:'success', s:'Scan complete. No anomalies detected.'}];
    return [{t:'error', s:'ANOMALIES DETECTED:'},...anomalies.map(a=>({t:'error', s:`  ⚠ ${a.id} — ${a.source} (${a.status}, delay: ${a.delay})`}))];
  },
  decrypt: () => [{t:'info', s:'Decryption initiated...'},{t:'success', s:'Key: GAMMA-7 verified.'},{t:'success', s:'Payload decrypted successfully.'}],
};

function handleTermKey(e) {
  const inp = document.getElementById('terminal-input');
  if (!inp) return;
  if (e.key === 'ArrowUp') {
    STATE.termHistIdx = Math.min(STATE.termHistory.length - 1, STATE.termHistIdx + 1);
    inp.value = STATE.termHistory[STATE.termHistIdx] || '';
    return;
  }
  if (e.key === 'ArrowDown') {
    STATE.termHistIdx = Math.max(-1, STATE.termHistIdx - 1);
    inp.value = STATE.termHistIdx >= 0 ? STATE.termHistory[STATE.termHistIdx] : '';
    return;
  }
  if (e.key !== 'Enter') return;
  const raw = inp.value.trim();
  if (!raw) return;
  STATE.termHistory.unshift(raw);
  STATE.termHistIdx = -1;
  inp.value = '';
  const out = document.getElementById('terminal-output');
  if (!out) return;

  const [cmd, ...args] = raw.toLowerCase().split(' ');
  const promptLine = `<div class="term-line"><span class="term-prompt">ARI@SYS:~$</span> ${escHtml(raw)}</div>`;

  let results = [];
  if (cmd === 'echo') {
    results = [{t:'', s:args.join(' ')}];
  } else if (cmd === 'ping') {
    const node = args[0] || 'alpha';
    const sig = STATE.dataset.find(s=>s.source.toLowerCase().includes(node));
    if (sig) results = [{t:'info', s:`PING ${sig.source}...`},{t:sig.status==='STABLE'?'success':'error', s:`Response: ${sig.delay} — ${sig.status}`}];
    else results = [{t:'error', s:`Node not found: ${node}`}];
  } else if (cmd === 'encrypt') {
    const txt = args.join(' ') || 'payload';
    results = [{t:'info', s:`Encrypting: "${txt}"`},{t:'success', s:'Result: ' + btoa(txt).slice(0,24) + '...'},{t:'success', s:'Cipher: AES-256-GCM applied.'}];
  } else if (cmd === 'note') {
    const q = args.join(' ').toLowerCase();
    const found = STATE.notes.filter(n=>n.title.toLowerCase().includes(q)||n.body.toLowerCase().includes(q));
    results = found.length ? found.map(n=>({t:'success',s:`[NOTE] ${n.title}\n  ${n.body.slice(0,80)}...`})) : [{t:'error',s:'No matching notes found.'}];
  } else if (TERM_COMMANDS[cmd]) {
    results = TERM_COMMANDS[cmd]() || [];
  } else {
    results = [{t:'error', s:`Command not found: ${cmd}. Type 'help' for list.`}];
  }

  out.innerHTML += promptLine;
  results.forEach(r => {
    out.innerHTML += `<div class="term-line ${r.t==='error'?'term-error':r.t==='info'?'term-info':r.t==='success'?'term-success':''}">${escHtml(r.s||'')}</div>`;
  });
  out.innerHTML += '<div class="term-line"> </div>';
  out.scrollTop = out.scrollHeight;
}

function renderCalendar() {
  const months = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const today = new Date();
  const first = new Date(STATE.calendarYear, STATE.calendarMonth, 1);
  const daysInMonth = new Date(STATE.calendarYear, STATE.calendarMonth + 1, 0).getDate();
  const startDay = first.getDay();

  let cells = '';
  for (let i = 0; i < startDay; i++) cells += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && STATE.calendarMonth === today.getMonth() && STATE.calendarYear === today.getFullYear();
    const hasEv = STATE.events.some(e => {
      const ed = new Date(e.date);
      return ed.getDate()===d && ed.getMonth()===STATE.calendarMonth && ed.getFullYear()===STATE.calendarYear;
    });
    cells += `<div class="cal-day${isToday?' today':''}${hasEv?' has-event':''}" onclick="addCalEvent(${d})">${d}</div>`;
  }

  const eventsThisMonth = STATE.events.filter(e => {
    const ed = new Date(e.date);
    return ed.getMonth()===STATE.calendarMonth && ed.getFullYear()===STATE.calendarYear;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  return `
    <div class="cal-nav">
      <button class="btn btn-amber" onclick="calNav(-1)">◀</button>
      <div class="cal-month">${months[STATE.calendarMonth]} ${STATE.calendarYear}</div>
      <button class="btn btn-amber" onclick="calNav(1)">▶</button>
    </div>
    <div class="cal-grid">
      ${['SU','MO','TU','WE','TH','FR','SA'].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}
      ${cells}
    </div>
    <div class="section-header" style="margin-top:12px">Events This Month (${eventsThisMonth.length})</div>
    <div style="overflow-y:auto;max-height:120px">
      ${eventsThisMonth.length ? eventsThisMonth.map(e=>`
        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(232,146,10,0.08);font-size:9px">
          <div style="color:var(--amber3);min-width:40px">${new Date(e.date).getDate()}</div>
          <div style="flex:1;color:var(--text)">${escHtml(e.title)}</div>
          <div onclick="deleteEvent('${e.id}')" style="cursor:pointer;color:var(--red);font-size:10px">✕</div>
        </div>
      `).join('') : '<div style="font-size:8px;color:var(--text-dim)">No events. Click a date to add one.</div>'}
    </div>
  `;
}

function calNav(dir) {
  STATE.calendarMonth += dir;
  if (STATE.calendarMonth > 11) { STATE.calendarMonth = 0; STATE.calendarYear++; }
  if (STATE.calendarMonth < 0) { STATE.calendarMonth = 11; STATE.calendarYear--; }
  const body = document.getElementById('body-calendar');
  if (body) body.innerHTML = renderCalendar();
}

function addCalEvent(day) {
  const title = prompt(`Add event for ${STATE.calendarMonth+1}/${day}/${STATE.calendarYear}:`);
  if (!title) return;
  const date = new Date(STATE.calendarYear, STATE.calendarMonth, day).toISOString();
  STATE.events.push({ id: uid(), date, title });
  save('events');
  const body = document.getElementById('body-calendar');
  if (body) body.innerHTML = renderCalendar();
  notify('Event added: ' + title, 'green');
}

function deleteEvent(id) {
  STATE.events = STATE.events.filter(e=>e.id!==id);
  save('events');
  const body = document.getElementById('body-calendar');
  if (body) body.innerHTML = renderCalendar();
}

function renderSearch() {
  return `
    <div style="margin-bottom:10px">
      <div style="display:flex;gap:8px">
        <input type="text" id="search-query" placeholder="Search notes, tasks, files..." style="flex:1"
          oninput="doSearch()" onkeydown="if(event.key==='Enter')doSearch()" />
      </div>
    </div>
    <div class="section-header">Results</div>
    <div id="search-results" style="overflow-y:auto;flex:1">
      <div style="font-size:9px;color:var(--text-dim)">Enter a query to search.</div>
    </div>
  `;
}

function doSearch() {
  const q = (document.getElementById('search-query')?.value || '').toLowerCase().trim();
  const container = document.getElementById('search-results');
  if (!container) return;
  if (!q) { container.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">Enter a query to search.</div>'; return; }

  const results = [];
  STATE.notes.forEach(n => {
    if (n.title.toLowerCase().includes(q) || n.body.toLowerCase().includes(q) || n.tags.join(' ').includes(q)) {
      results.push({ type:'NOTE', title:n.title, sub:n.body.slice(0,60)+'…', action:`openApp('notes')` });
    }
  });
  STATE.tasks.forEach(t => {
    if (t.text.toLowerCase().includes(q)) {
      results.push({ type:'TASK', title:t.text, sub:`Priority: ${t.priority} · ${t.done?'Done':'Pending'}`, action:`openApp('tasks')` });
    }
  });
  STATE.files.forEach(f => {
    if (f.name.toLowerCase().includes(q)) {
      results.push({ type:'FILE', title:f.name, sub:`${f.size} · ${ts2str(f.ts)}`, action:`openApp('vault')` });
    }
  });
  STATE.dataset.forEach(s => {
    if (s.id.toLowerCase().includes(q) || s.source.toLowerCase().includes(q)) {
      results.push({ type:'SIGNAL', title:`${s.id} — ${s.source}`, sub:`Status: ${s.status} · Strength: ${s.strength}`, action:`openApp('data')` });
    }
  });

  if (!results.length) { container.innerHTML = '<div style="font-size:9px;color:var(--text-dim)">No results found.</div>'; return; }
  container.innerHTML = results.map(r=>`
    <div class="search-result" onclick="${r.action}">
      <div class="search-result-type">${r.type}</div>
      <div class="search-result-title">${escHtml(r.title)}</div>
      <div class="search-result-sub">${escHtml(r.sub)}</div>
    </div>
  `).join('');
}

function renderTracker() {
  return `
    <div class="section-header">Signal Node Map</div>
    <canvas id="entity-canvas" width="380" height="200"></canvas>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div><span style="font-size:8px">STABLE</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div><span style="font-size:8px">ANOMALY</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div><span style="font-size:8px">DEGRADED</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div><span style="font-size:8px">OFFLINE</span></div>
    </div>
    <div class="section-header" style="margin-top:12px">Signal Pulse Feed</div>
    <div id="pulse-feed" style="font-size:8px;color:var(--text-dim);overflow-y:auto;max-height:100px"></div>
  `;
}

function renderSettings() {
  return `
    <div class="section-header">Researcher Profile</div>
    <div class="setting-row">
      <div><div class="setting-label">RESEARCHER NAME</div><div class="setting-desc">Displayed on the top bar</div></div>
      <div style="display:flex;gap:6px">
        <input type="text" id="set-name" value="${escHtml(STATE.settings.name)}" style="width:150px" />
        <button class="btn btn-amber" onclick="saveName()">SET</button>
      </div>
    </div>

    <div class="section-header" style="margin-top:14px">Display</div>
    <div class="setting-row">
      <div><div class="setting-label">ACCENT COLOR</div><div class="setting-desc">System highlight color</div></div>
      <div style="display:flex;gap:6px">
        ${['amber','cyan','green'].map(t=>`<button class="btn btn-${t==='amber'?'amber':t==='cyan'?'cyan':'green'}" onclick="setTheme('${t}')" style="min-width:60px;font-size:8px">${t.toUpperCase()}</button>`).join('')}
      </div>
    </div>

    <div class="section-header" style="margin-top:14px">Notifications</div>
    <div class="setting-row">
      <div><div class="setting-label">SYSTEM NOTIFICATIONS</div><div class="setting-desc">Show status notifications</div></div>
      <div class="toggle ${STATE.settings.notifications?'on':''}" id="toggle-notif" onclick="toggleSetting('notifications','toggle-notif')">
        <div class="toggle-knob"></div>
      </div>
    </div>

    <div class="section-header" style="margin-top:14px">Data Management</div>
    <div class="setting-row">
      <div><div class="setting-label">EXPORT ALL DATA</div><div class="setting-desc">Download as JSON file</div></div>
      <button class="btn btn-cyan" onclick="exportData()">EXPORT</button>
    </div>
    <div class="setting-row">
      <div><div class="setting-label">CLEAR ALL DATA</div><div class="setting-desc" style="color:var(--red)">This cannot be undone</div></div>
      <button class="btn btn-red" onclick="clearAllData()">WIPE</button>
    </div>

    <div class="section-header" style="margin-top:14px">System Info</div>
    <div style="font-size:8px;color:var(--text-dim);letter-spacing:1px;line-height:2">
      ARI OS v2.4.1<br>
      Engine: Chromium HTML5<br>
      Encryption: AES-256-GCM (simulated)<br>
      Build: ASYNC-RESEARCH-OS-240601
    </div>
  `;
}

function saveName() {
  const v = document.getElementById('set-name')?.value.trim();
  if (!v) return;
  STATE.settings.name = v.toUpperCase();
  save('settings');
  applySettings();
  notify('Profile updated.', 'green');
}

function setTheme(t) {
  STATE.settings.theme = t;
  save('settings');
  applySettings();
  notify('Theme: ' + t.toUpperCase());
}

function toggleSetting(key, toggleId) {
  STATE.settings[key] = !STATE.settings[key];
  save('settings');
  const el = document.getElementById(toggleId);
  if (el) el.className = 'toggle ' + (STATE.settings[key] ? 'on' : '');
}

function exportData() {
  const data = { notes: STATE.notes, tasks: STATE.tasks, files: STATE.files, events: STATE.events, dataset: STATE.dataset };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ari_data_export_' + Date.now() + '.json';
  a.click();
  notify('Data exported.', 'green');
}

function clearAllData() {
  if (!confirm('WIPE ALL DATA? This cannot be undone.')) return;
  ['notes','tasks','files','events'].forEach(k => { STATE[k] = []; save(k); });
  notify('All data wiped.', 'red');
}

// ============ INIT APP LOGIC ============
function initAppLogic(appId) {
  if (appId === 'terminal') {
    setTimeout(() => {
      const inp = document.getElementById('terminal-input');
      if (inp) inp.focus();
    }, 100);
  }
  if (appId === 'tracker') {
    setTimeout(() => drawTrackerCanvas(), 100);
    startTrackerFeed();
  }
}

// ============ TRACKER CANVAS ============
const NODE_POS = [
  {x:0.15,y:0.3,idx:0},{x:0.3,y:0.7,idx:1},{x:0.5,y:0.15,idx:2},
  {x:0.55,y:0.6,idx:3},{x:0.7,y:0.85,idx:4},{x:0.75,y:0.3,idx:5},{x:0.9,y:0.55,idx:6}
];

const EDGE_PAIRS = [[0,2],[2,5],[5,6],[6,3],[3,1],[1,0],[2,3],[5,3]];

function drawTrackerCanvas() {
  const canvas = document.getElementById('entity-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;

  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(232,146,10,0.05)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 30) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 30) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  const colors = { STABLE:'#1aff8c', ANOMALY:'#ff3c3c', DEGRADED:'#e8920a', OFFLINE:'#5a6870' };

  // Edges
  ctx.lineWidth = 1;
  EDGE_PAIRS.forEach(([a,b]) => {
    const na = NODE_POS[a], nb = NODE_POS[b];
    const sa = STATE.dataset[a]?.status, sb = STATE.dataset[b]?.status;
    ctx.strokeStyle = (sa==='STABLE'&&sb==='STABLE') ? 'rgba(26,255,140,0.2)' : 'rgba(232,146,10,0.15)';
    ctx.beginPath();
    ctx.moveTo(na.x*W, na.y*H);
    ctx.lineTo(nb.x*W, nb.y*H);
    ctx.stroke();
  });

  // Nodes
  NODE_POS.forEach((pos, i) => {
    const sig = STATE.dataset[i];
    if (!sig) return;
    const color = colors[sig.status] || '#5a6870';
    const x = pos.x * W, y = pos.y * H;

    // Pulse ring (for non-offline)
    if (sig.status !== 'OFFLINE') {
      ctx.beginPath();
      ctx.arc(x, y, 12, 0, Math.PI*2);
      ctx.strokeStyle = color + '30';
      ctx.lineWidth = 1;
      ctx.stroke();
    }

    // Node circle
    ctx.beginPath();
    ctx.arc(x, y, 6, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    ctx.fillStyle = color;
    ctx.font = '7px monospace';
    ctx.fillText(sig.id, x + 10, y - 4);
    ctx.fillStyle = 'rgba(200,212,216,0.6)';
    ctx.fillText(sig.source.split(' ')[1], x + 10, y + 5);
  });
}

function startTrackerFeed() {
  const feed = document.getElementById('pulse-feed');
  if (!feed) return;
  const msgs = [
    'SIG-001: Heartbeat received — ALPHA stable',
    'SIG-002: Anomaly spike detected — delay 340ms',
    'SIG-003: Telemetry sync — CHARLIE nominal',
    'SIG-004: DELTA degradation continues',
    'SIG-007: GHOST signal intermittent — investigating',
    'SIG-006: FOXTROT ping OK',
  ];
  let idx = 0;
  const iv = setInterval(() => {
    const canvas = document.getElementById('entity-canvas');
    if (!canvas) { clearInterval(iv); return; }
    const feedEl = document.getElementById('pulse-feed');
    if (!feedEl) { clearInterval(iv); return; }
    const ts = new Date().toLocaleTimeString();
    feedEl.innerHTML = `<div>[${ts}] ${msgs[idx % msgs.length]}</div>` + feedEl.innerHTML;
    idx++;
    if (feedEl.children.length > 8) feedEl.lastElementChild?.remove();
  }, 2500);
}

// ============ STARTUP ============
setTimeout(() => {
  openApp('dashboard');
  notify('ARI OS initialized. Welcome, ' + (STATE.settings.name || 'Researcher') + '.', 'green');
}, 400);
</script>
